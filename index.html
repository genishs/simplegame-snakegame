<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Snake Game</h1>
    <div class="hud">
      <span>Stage: <strong id="stage">Tutorial</strong></span>
      <span>Score: <strong id="score">0</strong></span>
      <span>Best: <strong id="best">0</strong></span>
    </div>
    <canvas id="board" width="400" height="400"></canvas>
    <div class="overlay" id="overlay">
      <div class="overlay-content">
        <h2 id="overlay-title">Press Space to Start</h2>
        <p id="overlay-msg">Arrow keys or WASD to move</p>
      </div>
    </div>
    <p class="hint">↑ ↓ ← → / WASD — Move &nbsp;·&nbsp; Space — Pause / Restart &nbsp;·&nbsp; Esc — Skip tutorial</p>
    <p class="version">v0.5.1</p>
  </div>
  <script src="game.js"></script>
</body>
</html>
